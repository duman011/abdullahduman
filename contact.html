<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abdullah Duman - İletişim</title>
  <meta name="description" content="Abdullah Duman ile yazılım projeleri, iş birlikleri ve teknoloji çözümleri için iletişim bilgileri">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    :root {
      --bg-dark: #121212;
      --bg-dark-alt: #22223b;
      --text-dark: #ffffff;
      --accent-color: #00c9ff;
      --bg-light: #f4f7fa;
      --text-light: #333;
      --cube-size: 60px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Roboto', sans-serif;
      color: var(--text-dark);
      background: var(--bg-dark);
      transition: background 0.7s, color 0.7s;
      overflow-x: hidden;
      min-height: 100vh;
    }
    body.light {
      background: var(--bg-light) !important;
      color: var(--text-light);
    }
    .matrix-bg {
      pointer-events: none;
      position: fixed;
      z-index: 1;
      width: 100vw;
      height: 100vh;
      top: 0; left: 0;
      opacity: 0.18;
      background: transparent;
      animation: matrixFadeIn 0.7s cubic-bezier(.55,0,.6,1) 0.05s both;
    }
    @keyframes matrixFadeIn {
      0% { opacity: 0; }
      100% { opacity: 0.18; }
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 10%;
      background: rgba(0,0,0,0.5);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(5px);
      animation: contentEnter 1s cubic-bezier(.62,-0.04,.26,1.1) 0.12s both;
    }
    body.light header { background: rgba(255,255,255,0.8); }
    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.5rem;
      color: var(--accent-color);
      letter-spacing: 2px;
      text-shadow: 0 0 10px #00c9ff;
      flex-shrink: 0;
    }
    nav {
      display: flex;
      gap: 2px;
      align-items: center;
      margin-left: auto;
    }
    nav a {
      color: inherit;
      text-decoration: none;
      margin-left: 15px;
      font-weight: 400;
      position: relative;
      padding: 5px 13px;
      border-radius: 8px;
      transition: background 0.22s, color 0.22s;
    }
    nav a::after {
      content: '';
      width: 0;
      height: 2px;
      background: var(--accent-color);
      position: absolute;
      bottom: -5px;
      left: 0;
      transition: width 0.3s;
    }
    nav a:hover, nav a.active {
      background: rgba(0,201,255,0.11);
      color: var(--accent-color);
    }
    nav a:hover::after, nav a.active::after { width: 100%; }
    @media (max-width: 800px) {
      header {
        flex-direction: column;
        padding: 13px 4vw 5px 4vw;
        gap: 5px;
      }
      .logo {
        font-size: 1.1rem;
        margin-bottom: 4px;
      }
      nav {
        justify-content: center;
        width: 100%;
        margin: 0;
        gap: 2px;
      }
      nav a {
        margin-left: 7px;
        font-size: 1rem;
        padding: 6px 9px;
      }
    }
    @media (max-width:480px) {
      header {
        padding: 7px 1vw 2px 1vw;
      }
      .logo {
        font-size: .95rem;
      }
      nav a {
        margin-left: 4px;
        font-size: 0.97rem;
        padding: 5px 6px;
        border-radius: 7px;
      }
    }
    .main-content {
      opacity: 0;
      transform: translateY(40px);
      animation: contentEnter 0.92s cubic-bezier(.62,-0.04,.26,1.1) 0.17s both;
    }
    @keyframes contentEnter {
      0% { opacity: 0; transform: translateY(40px);}
      100% { opacity: 1; transform: translateY(0);}
    }
    .container {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      padding: 55px 0 30px 0;
      position: relative;
      z-index: 10;
    }
    .page-title {
      font-size: 2.1rem;
      font-family: 'Orbitron', sans-serif;
      color: var(--accent-color);
      margin-bottom: 30px;
      letter-spacing: 1px;
      text-align: center;
    }
    body.light .page-title {
      color: #007ea7;
    }
    .contact-form {
      background-color: #222;
      padding: 22px 16px 16px 16px;
      border-radius: 11px;
      box-shadow: 0 4px 18px rgba(0, 201, 255, 0.12);
      margin-top: 15px;
      animation: fadeInUp 1.35s cubic-bezier(.62,-0.04,.26,1.1) 0.18s both;
    }
    body.light .contact-form {
      background-color: #fff;
      box-shadow: 0 4px 12px rgba(0,126,167,0.09);
    }
    .contact-form h2 {
      text-align: center;
      font-size: 1.18rem;
      font-family: 'Orbitron', sans-serif;
      color: var(--accent-color);
      margin-bottom: 20px;
      font-weight: 600;
      letter-spacing: 1px;
      opacity: 1;
      animation: none;
    }
    body.light .contact-form h2 {
      color: #007ea7;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      margin-bottom: 4px;
      color: #fff;
      font-size: 1rem;
      font-weight: 500;
    }
    body.light .form-group label {
      color: #222;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #333;
      border-radius: 5px;
      background-color: #333;
      color: #fff;
      font-size: 1rem;
      font-family: inherit;
      transition: border 0.22s;
      margin-bottom: 5px;
      resize: none;
    }
    body.light .form-group input,
    body.light .form-group textarea {
      background-color: #f2f2f2;
      border: 1px solid #ccc;
      color: #222;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      border-color: var(--accent-color);
      outline: none;
    }
    .form-group button {
      padding: 12px 20px;
      background-color: #00c9ff;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 1px;
      transition: background 0.25s;
    }
    .form-group button:hover {
      background-color: rgb(6, 193, 120);
      color: #fff;
    }
    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    /* Tema Küpü */
    .theme-toggle-cube-wrap {
      margin: 50px auto 0 auto;
      perspective: 600px;
      width: var(--cube-size);
      height: var(--cube-size);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 11;
      transition: filter 0.3s;
    }
    .theme-toggle-cube {
      width: var(--cube-size);
      height: var(--cube-size);
      position: relative;
      transform-style: preserve-3d;
      transition: transform 1s cubic-bezier(.68,-0.55,.27,1.55);
    }
    .rotated { transform: rotateY(180deg) rotateX(180deg); }
    .cube-face {
      position: absolute;
      width: var(--cube-size);
      height: var(--cube-size);
      background: linear-gradient(135deg,#00c9ff 0%,#181f2a 100%);
      border: 2px solid #00c9ff80;
      border-radius: 14px;
      box-shadow: 0 4px 22px #00c9ff44;
      color: #fff;
      font-size: 2rem;
      font-family: 'Orbitron', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
      user-select: none;
    }
    .cube-face.top    { transform: rotateX(90deg) translateZ(30px);}
    .cube-face.bottom { transform: rotateX(-90deg) translateZ(30px);}
    .cube-face.right  { transform: rotateY(90deg) translateZ(30px);}
    .cube-face.left   { transform: rotateY(-90deg) translateZ(30px);}
    .cube-face.front  { transform: translateZ(30px);}
    .cube-face.back   { transform: rotateY(180deg) translateZ(30px);}
    .theme-toggle-cube-wrap:hover {
      filter: brightness(1.22) drop-shadow(0 0 32px #ff1867) drop-shadow(0 0 8px #00c9ff) contrast(1.2);
    }
    .theme-loader-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(15,32,39,0.96);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      animation: fadeIn .5s;
    }
    .theme-loader-overlay.active { display: flex; }
    .loader-circuit {
      width: 82px; height: 82px;
      display: grid; place-items: center;
      margin-bottom: 16px;
    }
    .loader-circuit::before {
      content: '';
      width: 82px; height: 82px;
      border: 5px solid #00c9ff55;
      border-top: 5px solid #00c9ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      position: absolute;
      left: 0; top: 0;
    }
    .loader-circuit::after {
      content: '';
      width: 36px; height: 36px;
      border: 3px solid #00c9ff99;
      border-bottom: 3px solid #181f2a;
      border-radius: 50%;
      position: absolute;
      left: 23px; top: 23px;
      animation: spin-rev 1.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg);} }
    @keyframes spin-rev { to { transform: rotate(-360deg);} }
    .loader-text {
      font-family: 'Orbitron', monospace;
      color: #00c9ff;
      font-size: 1.2rem;
      letter-spacing: 2px;
      text-shadow: 0 0 10px #00c9ff;
      animation: flicker .7s infinite alternate;
      margin-top: 10px;
    }
    @keyframes flicker {
      from { opacity: .85;}
      to { opacity: 1;}
    }
    @media (max-width: 700px) {
      .container { max-width: 98vw; padding: 12vw 0 6vw 0; }
    }
    @media (max-width: 500px) {
      .container { padding: 10vw 0 4vw 0; }
      .page-title { font-size: 1.33rem;}
      .contact-form h2 { font-size: 1rem;}
    }
  </style>
</head>
<body>
  <canvas id="matrixBg" class="matrix-bg"></canvas>
  <header>
    <div class="logo">ABDULLAH DUMAN</div>
    <nav>
      <a href="index.html">Ana Sayfa</a>
      <a href="projects.html">Projeler</a>
      <a href="resume.html">Özgeçmiş</a>
      <a href="contact.html" class="active">İletişim</a>
    </nav>
  </header>
  <div class="main-content">
    <div class="container">
      <h1 class="page-title">İletişim</h1>
      <div class="contact-form">
        <h2>Bizimle İletişime Geçin</h2>
        <form action="mailto:dduman.abdulla2003@gmail.com" method="post" enctype="text/plain">
          <div class="form-group">
            <label for="name">Adınız Soyadınız:</label>
            <input type="text" id="name" name="name" required />
          </div>
          <div class="form-group">
            <label for="email">E-posta Adresiniz:</label>
            <input type="email" id="email" name="email" required />
          </div>
          <div class="form-group">
            <label for="message">Mesajınız:</label>
            <textarea id="message" name="message" rows="5" required></textarea>
          </div>
          <div class="form-group">
            <button type="submit">Mesaj Gönder</button>
          </div>
        </form>
      </div>
      <!-- Tema değiştirme butonu alt kısımda -->
      <div class="theme-toggle-cube-wrap" id="themeCubeBtn">
        <div class="theme-toggle-cube" id="cube3d">
          <div class="cube-face front">🌚</i></div>
          <div class="cube-face back"><i class="fas fa-sun"></i></div>
          <div class="cube-face top">🌙</div>
          <div class="cube-face bottom">☀️</div>
          <div class="cube-face left"><i class="fas fa-laptop-code"></i></div>
          <div class="cube-face right"><i class="fas fa-bolt"></i></div>
        </div>
      </div>
    </div>
    <div class="theme-loader-overlay" id="themeLoader">
      <div class="loader-circuit"></div>
      <div class="loader-text">Tema değiştiriliyor...</div>
    </div>
  </div>
  <script>
    // Matrix yağmuru
    function matrixRain() {
      const canvas = document.getElementById('matrixBg');
      const ctx = canvas.getContext('2d');
      let w = window.innerWidth;
      let h = window.innerHeight;
      canvas.width = w;
      canvas.height = h;
      let fontSize = 16;
      let columns = Math.floor(w / fontSize);
      let drops = [];
      for (let i = 0; i < columns; i++) drops[i] = Math.random() * h;
      const matrixChars = '01ABCDEFGHIJKLMNOPQRSTUVXYZ#@&%$?'.split('');
      function draw() {
        ctx.fillStyle = 'rgba(18,18,18,0.15)';
        ctx.fillRect(0, 0, w, h);
        ctx.font = fontSize + 'px monospace';
        ctx.fillStyle = '#00c9ff';
        for (let i = 0; i < drops.length; i++) {
          const text = matrixChars[Math.floor(Math.random() * matrixChars.length)];
          ctx.fillText(text, i * fontSize, drops[i] * fontSize);
          if (Math.random() > 0.965) drops[i] = 0;
          drops[i]++;
        }
      }
      setInterval(draw, 50);
      window.addEventListener('resize', () => {
        w = window.innerWidth;
        h = window.innerHeight;
        canvas.width = w;
        canvas.height = h;
      });
    }
    // 3D Cube ve tema geçiş animasyonu
    const themeCube = document.getElementById('cube3d');
    const cubeBtn = document.getElementById('themeCubeBtn');
    const loader = document.getElementById('themeLoader');
    let isRotated = false;
    function updateCubeFace() {
      if (document.body.classList.contains('light')) {
        themeCube.classList.add('rotated');
        isRotated = true;
      } else {
        themeCube.classList.remove('rotated');
        isRotated = false;
      }
    }
    cubeBtn.onclick = function () {
      isRotated = !isRotated;
      themeCube.classList.toggle('rotated');
      setTimeout(()=>{
        document.body.classList.toggle('light');
        localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
        updateCubeFace();
        if (!document.body.classList.contains('light'))
          document.body.style.background = 'var(--bg-dark-alt)';
        else
          document.body.style.background = '';
        loader.classList.add('active');
        setTimeout(()=>{ loader.classList.remove('active'); }, 950);
      }, 180); // Küp dönerken efekt daha doğal olsun
    };
    window.onload = () => {
      if (localStorage.getItem('theme') === 'light') {
        document.body.classList.add('light');
      }
      matrixRain();
      setTimeout(()=>{ updateCubeFace(); }, 50);
      // Giriş animasyonu tekrar başlasın (yenilemede animasyon)
      document.querySelector('.main-content').style.opacity = 0;
      document.querySelector('.main-content').style.transform = 'translateY(40px)';
      setTimeout(()=>{
        document.querySelector('.main-content').style.opacity = 1;
        document.querySelector('.main-content').style.transform = 'translateY(0)';
      },120);
    };
  </script>
</body>
</html>
