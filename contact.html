<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abdullah Duman - İletişim</title>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-3M56YTT90B"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-3M56YTT90B');
  </script>

  <meta name="description" content="Abdullah Duman ile yazılım projeleri, iş birlikleri ve teknoloji çözümleri için iletişim bilgileri">
  
  <style>
    body {
      margin: 0;
      font-family: 'roboto', sans-serif;
      background-color: #121212;
      color: #f5f5f5;
      line-height: 1.6;
      overflow-x: auto;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    body.light {
      background: linear-gradient(135deg, #e0f7fa, #f1f8ff);
      color: #006064;
    }

    h1, h2 {
      text-align: center;
      font-weight: 700;
      color: #00ffe0;
      opacity: 0;
      animation: fadeIn 2s forwards;
    }

    body.light h1, body.light h2 {
      color: #006064;
    }

    .page-title {
      font-size: 2.5rem;
    }

    .container {
      width: 80%;
      margin: 0 auto;
      padding: 30px 0;
    }

    header {
      background: rgba(0, 0, 0, 0.7);
      padding: 20px 5%;
      position: sticky;
      top: 0;
      z-index: 1000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.3s ease;
    }

    body.light header {
      background: rgba(255, 255, 255, 0.9);
    }

    .logo {
      font-size: 1.5rem;
      color: #00ffe0;
      letter-spacing: 2px;
      animation: glitch 2s infinite;
    }

    body.light .logo {
      color: #007ea7;
    }

    @keyframes glitch {
      0% { text-shadow: 1px 1px #ff00c1; }
      20% { text-shadow: -1px -1px #00ffe0; }
      40% { text-shadow: 1px -1px #ff00c1; }
      60% { text-shadow: -1px 1px #00ffe0; }
      80% { text-shadow: 0px 0px #fff; }
      100% { text-shadow: 1px 1px #ff00c1; }
    }

    nav a {
      margin: 0 15px;
      text-decoration: none;
      color: #ccc;
      font-size: 1.2rem;
      position: relative;
      transition: color 0.3s;
      font-weight: bold;
    }

    body.light nav a {
      color: #333;
    }

    nav a.active,
    nav a:hover {
      text-shadow: 0 0 10px #ff00c1, 0 0 20px #ff00c1, 0 0 40px #ff00c1;
    }

    nav a::after {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      background: #00ffe0;
      left: 0;
      bottom: -5px;
      transition: 0.3s;
    }

    nav a:hover::after {
      width: 100%;
    }

    .contact-form {
      background-color: #222;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
    }

    body.light .contact-form {
      background-color: #ffffff;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      color: #fff;
    }

    body.light .form-group label {
      color: #222;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #333;
      border-radius: 5px;
      background-color: #333;
      color: #fff;
    }

    body.light .form-group input,
    body.light .form-group textarea {
      background-color: #f2f2f2;
      border: 1px solid #ccc;
      color: #222;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: #006064;
    }

    .form-group button {
      padding: 12px 20px;
      background-color: #006064;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .form-group button:hover {
      background-color: rgb(6, 193, 13);
    }

    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .animate__fadeIn { animation: fadeIn 2s forwards; }
    .animate__fadeInUp { animation: fadeInUp 1.5s forwards; }

    .theme-toggle {
      cursor: pointer;
      width: 35px;
      height: 35px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, red, orange, yellow, lime, cyan, blue, magenta, red);
      transition: 0.3s ease;
    }

    .theme-toggle:hover {
      transform: rotate(360deg);
      box-shadow: 0 0 10px #ff00c1, 0 0 20px #00ffe0;
    }

    .page-out {
      animation: fadeOut 0.5s forwards;
    }

    @keyframes fadeOut {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }

    @media (max-width: 768px) {
      .logo { font-size: 1.3rem; }
      nav a { font-size: 1rem; margin: 0 10px; }
      .theme-toggle { width: 30px; height: 30px; }
      .page-title { font-size: 1.8rem; }
      .form-group button { width: 100%; padding: 15px; }
    }

    @media (max-width: 480px) {
      header { padding: 10px 3%; }
      .logo { font-size: 1.2rem; text-align: center; }
      nav a { font-size: 0.9rem; margin: 0 5px; }
      .container { width: 100%; padding: 15px 10px; }
      .page-title { font-size: 1.6rem; }
      .theme-toggle { width: 25px; height: 25px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">ABDULLAH DUMAN</div>
    <nav>
      <a href="index.html">Ana Sayfa</a>
      <a href="projects.html">Projeler</a>
      <a href="resume.html">Özgeçmiş</a>
      <a href="contact.html" class="active">İletişim</a>
    </nav>
    <div class="theme-toggle" onclick="toggleTheme()" title="Temayı Değiştir"></div>
  </header>

  <div class="container">
    <h1 class="page-title animate__fadeIn">İletişim</h1>

    <div class="contact-form animate__fadeInUp">
      <h2>Bizimle İletişime Geçin</h2>
      <form action="mailto:dduman.abdulla2003@gmail.com" method="post" enctype="text/plain">
        <div class="form-group">
          <label for="name">Adınız Soyadınız:</label>
          <input type="text" id="name" name="name" required />
        </div>

        <div class="form-group">
          <label for="email">E-posta Adresiniz:</label>
          <input type="email" id="email" name="email" required />
        </div>

        <div class="form-group">
          <label for="message">Mesajınız:</label>
          <textarea id="message" name="message" rows="5" required></textarea>
        </div>

        <div class="form-group">
          <button type="submit">Mesaj Gönder</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    function toggleTheme() {
      const body = document.body;
      body.classList.toggle('light');
      localStorage.setItem('theme', body.classList.contains('light') ? 'light' : 'dark');
    }

    window.onload = () => {
      if (localStorage.getItem('theme') === 'light') {
        document.body.classList.add('light');
      }
    };

    document.querySelectorAll('nav a').forEach(link => {
      link.addEventListener('click', function(e) {
        const targetUrl = this.href;
        if (this.classList.contains('active')) return;
        e.preventDefault();
        document.body.classList.add('page-out');
        setTimeout(() => window.location.href = targetUrl, 500);
      });
    });
  </script>
</body>
</html>
